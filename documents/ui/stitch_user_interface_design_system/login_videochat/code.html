<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VideoChat - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1b1b21",
                        "on-tertiary-fixed": "#002019",
                        "surface-variant": "#e4e1ea",
                        "on-background": "#1b1b21",
                        "surface-bright": "#fbf8ff",
                        "on-secondary-fixed-variant": "#004f58",
                        "inverse-surface": "#303036",
                        "on-tertiary-fixed-variant": "#005142",
                        "outline-variant": "#c6c5d4",
                        "on-surface-variant": "#454652",
                        "primary": "#000666",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#f2eff8",
                        "secondary-container": "#00e3fd",
                        "tertiary-container": "#00372c",
                        "surface-tint": "#4c56af",
                        "on-primary-container": "#8690ee",
                        "on-secondary": "#ffffff",
                        "surface-container": "#efecf5",
                        "primary-fixed-dim": "#bdc2ff",
                        "surface-dim": "#dbd9e1",
                        "tertiary": "#002018",
                        "primary-container": "#1a237e",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#bdc2ff",
                        "primary-fixed": "#e0e0ff",
                        "tertiary-fixed": "#5ffbd6",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#9cf0ff",
                        "on-secondary-container": "#00616d",
                        "outline": "#767683",
                        "background": "#fbf8ff",
                        "surface-container-highest": "#e4e1ea",
                        "surface": "#fbf8ff",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#00ab8e",
                        "on-primary-fixed-variant": "#343d96",
                        "on-secondary-fixed": "#001f24",
                        "tertiary-fixed-dim": "#38debb",
                        "surface-container-low": "#f5f2fb",
                        "secondary-fixed-dim": "#00daf3",
                        "surface-container-high": "#eae7ef",
                        "secondary": "#006875",
                        "on-primary-fixed": "#000767"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-login-gradient {
            background: radial-gradient(circle at top right, #e0e0ff 0%, #fbf8ff 45%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-secondary-fixed selection:text-on-secondary-fixed min-h-screen flex items-center justify-center p-6 bg-login-gradient">
<!-- Global Shell Filter: TopNavBar/SideNavBar suppressed for Transactional Screen -->
<main class="w-full max-w-md">
<!-- Brand Header - Editorial Minimalist Placement -->
<div class="mb-12 flex flex-col items-center">
<div class="mb-4">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="videocam">videocam</span>
</div>
<h1 class="font-headline text-headline-lg font-extrabold tracking-tighter text-primary text-3xl">VideoChat</h1>
</div>
<!-- Login Card - Elevated Paper Metaphor -->
<div class="bg-surface-container-lowest p-10 rounded-xl transition-all duration-300">
<div class="mb-8">
<h2 class="font-headline text-2xl font-bold tracking-tight text-on-surface">Sign in to VideoChat</h2>
<p class="text-on-surface-variant text-sm mt-2">Enter your credentials to access your workspace</p>
</div>
<form class="space-y-8">
<!-- Input Group: Email -->
<div class="relative group">
<label class="absolute -top-6 left-0 text-xs font-semibold tracking-wider text-on-surface-variant/70 uppercase" for="email">Email Address</label>
<input class="w-full bg-transparent border-none border-b-2 border-surface-variant focus:ring-0 focus:border-secondary text-on-surface py-3 px-0 font-medium placeholder:text-outline-variant/60 transition-all duration-200" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Input Group: Password -->
<div class="relative group">
<div class="flex justify-between items-center absolute -top-6 left-0 w-full">
<label class="text-xs font-semibold tracking-wider text-on-surface-variant/70 uppercase" for="password">Password</label>
<a class="text-xs font-semibold text-secondary hover:text-on-secondary-container transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full bg-transparent border-none border-b-2 border-surface-variant focus:ring-0 focus:border-secondary text-on-surface py-3 px-0 font-medium placeholder:text-outline-variant/60 transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Primary CTA - Velocity Theme -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary py-4 px-8 rounded-full font-headline font-bold text-lg tracking-tight hover:shadow-lg hover:shadow-primary/10 active:scale-[0.98] transition-all duration-200 bg-gradient-to-r from-primary to-primary-container" type="submit">
                        Sign In
                    </button>
</div>
</form>
<!-- Secondary Action - Energetic Tone -->
<div class="mt-10 pt-10 border-t border-surface-container flex flex-col items-center gap-4">
<p class="text-on-surface-variant text-sm">Don't have an account?</p>
<button class="bg-secondary-fixed text-on-secondary-fixed py-2 px-6 rounded-full font-semibold text-sm hover:bg-secondary-container active:scale-[0.98] transition-all duration-200">
                    Create free account
                </button>
</div>
</div>
<!-- Semantic Footer Links -->
<footer class="mt-8 flex justify-center gap-6 text-on-surface-variant/60 text-xs font-medium">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">System Status</a>
</footer>
</main>
<!-- Decorative Velocity Element: Background Glass Orb -->
<div class="fixed -bottom-32 -left-32 w-96 h-96 bg-secondary-container/20 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed top-20 right-10 w-64 h-64 bg-primary-fixed/20 rounded-full blur-[80px] pointer-events-none"></div>
</body></html>
